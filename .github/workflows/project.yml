name: Project
description: Add issue to a project

on:
  pull_request_target:
  issues:
   types: 
    - opened
    
jobs: 
  add-to-project:
    name: Add issue to project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/orgs/DINA-community/projects/4
          github-token: ${{ secrets.Label_set }}

